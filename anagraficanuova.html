<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Anagrafica nuova</title>
</head>
<body>

    <h1>Anagrafica nuova</h1>

    <form id="anagraficaForm" onsubmit="return controlla();">
        <p>
            <label for="nome">Nome *</label><br>
            <input type="text" id="nome">
        </p>

        <p>
            <label for="cognome">Cognome *</label><br>
            <input type="text" id="cognome">
        </p>

        <p>
            <label for="cap">CAP *</label><br>
            <input type="text" id="cap">
        </p>

        <p>
            <label for="username">Username *</label><br>
            <input type="text" id="username">
        </p>

        <p>
            <label for="email">Email *</label><br>
            <input type="text" id="email">
        </p>

        <button type="submit">Registrati</button>
    </form>

    <script>
        function controlla() {
            var nome = document.getElementById("nome").value;
            var cognome = document.getElementById("cognome").value;
            var cap = document.getElementById("cap").value;
            var username = document.getElementById("username").value;
            var email = document.getElementById("email").value;

            // regex semplici, dichiarate qui dentro (non ottimale)
            var regSoloLettere = /^[A-Za-z]+$/;
            var regCap = /^[0-9]{5}$/;
            var regUsername = /^[A-Za-z0-9]{3,16}$/;
            var regEmail = /^[^@s]+@[^@s]+.[^@s]+$/;

            // Controllo nome
            if (nome == "") {
                alert("Devi inserire il nome");
                return false;
            }
            if (!regSoloLettere.test(nome)) {
                alert("Il nome deve contenere solo lettere (A-Z, a-z)");
                return false;
            }

            // Controllo cognome
            if (cognome == "") {
                alert("Devi inserire il cognome");
                return false;
            }
            if (!regSoloLettere.test(cognome)) {
                alert("Il cognome deve contenere solo lettere (A-Z, a-z)");
                return false;
            }

            // Controllo CAP
            if (cap == "") {
                alert("Devi inserire il CAP");
                return false;
            }
            if (!regCap.test(cap)) {
                alert("Il CAP deve essere di 5 cifre (es: 00100)");
                return false;
            }

            // Controllo username
            if (username == "") {
                alert("Devi inserire lo username");
                return false;
            }
            if (!regUsername.test(username)) {
                alert("Lo username deve essere lungo da 3 a 16 caratteri e contenere solo lettere e numeri");
                return false;
            }

            // Controllo email
            if (email == "") {
                alert("Devi inserire l'email");
                return false;
            }
            if (!regEmail.test(email)) {
                alert("L'email non è valida (es: nome@esempio.it)");
                return false;
            }

            alert("Registrazione completata!");
            // fa inviare davvero il form (si ricarica la pagina)
            return true;
        }
    </script>

</body>
</html>
