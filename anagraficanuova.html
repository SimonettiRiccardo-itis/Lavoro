<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Anagrafica nuova</title>
</head>
<body>

    <h1>Anagrafica nuova</h1>

    <form id="anagraficaForm" onsubmit="return controlla();">
        <p>
            <label for="nome">Nome *</label><br>
            <input type="text" id="nome">
        </p>

        <p>
            <label for="cognome">Cognome *</label><br>
            <input type="text" id="cognome">
        </p>

        <p>
            <label for="cap">CAP *</label><br>
            <input type="text" id="cap">
        </p>

        <p>
            <label for="username">Username *</label><br>
            <input type="text" id="username">
        </p>

        <p>
            <label for="email">Email *</label><br>
            <input type="text" id="email">
        </p>

        <button type="submit">Registrati</button>
    </form>

    <script>
        function controlla() {
            // Controllo nome
            if (document.getElementById("nome").value == "") {
                alert("Devi inserire il nome");
                return false;
            }

            // Controllo cognome
            if (document.getElementById("cognome").value == "") {
                alert("Devi inserire il cognome");
                return false;
            }

            // Controllo CAP (solo controlli molto semplici)
            var cap = document.getElementById("cap").value;
            if (cap == "") {
                alert("Devi inserire il CAP");
                return false;
            }
            if (cap.length != 5) {
                alert("Il CAP deve avere esattamente 5 caratteri");
                return false;
            }
            if (isNaN(cap)) {
                alert("Il CAP deve contenere solo numeri");
                return false;
            }

            // Controllo username (solo minimo 3 caratteri)
            var username = document.getElementById("username").value;
            if (username == "") {
                alert("Devi inserire lo username");
                return false;
            }
            if (username.length < 3) {
                alert("Lo username deve avere almeno 3 caratteri");
                return false;
            }

            // Controllo email molto grezzo
            var email = document.getElementById("email").value;
            if (email == "") {
                alert("Devi inserire l'email");
                return false;
            }
            if (email.indexOf("@") == -1 || email.indexOf(".") == -1) {
                alert("L'email non sembra valida");
                return false;
            }

            alert("Registrazione completata!");
            return true; // permette l'invio del form
        }
    </script>

</body>
</html>
