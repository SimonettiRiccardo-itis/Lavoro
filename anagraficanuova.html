<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Anagrafica nuova</title>
</head>
<body>

    <h1>Anagrafica nuova</h1>

    <form>
        <p>
            <label for="nome">Nome *</label><br>
            <input type="text" id="nome" name="nome">
        </p>

        <p>
            <label for="cognome">Cognome *</label><br>
            <input type="text" id="cognome" name="cognome">
        </p>

        <p>
            <label for="cap">CAP *</label><br>
            <input type="text" id="cap" name="cap">
        </p>

        <p>
            <label for="username">Username *</label><br>
            <input type="text" id="username" name="username">
        </p>

        <p>
            <label for="email">Email *</label><br>
            <input type="text" id="email" name="email">
        </p>

        <button type="submit" onclick="checkForm()"> Registrati</button>
    </form>
  

    <script>
        function checkForm() {
            var nome = document.getElementById("nome").value;
            var cognome = document.getElementById("cognome").value;
            var cap = document.getElementById("cap").value;
            var username = document.getElementById("username").value;
            var email = document.getElementById("email").value;

            var regexNome = /^[A-Za-z]+$/;
            if (nome == "" || !regexNome.test(nome)) {
                alert("Nome invalido - solo lettere");
                return false;
            }

            var regexCognome = /^[A-Za-z]+$/;
            if (cognome == "" || !regexCognome.test(cognome)) {
                alert("Cognome invalido - solo lettere");
                return false;
            }

            var regexCap = /^[0-9]{5}$/;
            if (cap == "" || !regexCap.test(cap)) {
                alert("CAP invalido - 5 cifre");
                return false;
            }

            var regexUsername = /^[A-Za-z0-9!@#$%^&*()_+=[]{};':"\\|,.<>/?]{3,16}$/;
            if (username == "" || !regexUsername.test(username)) {
                alert("Username invalido - 3-16 caratteri");
                return false;
            }

            var regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (email == "" || !regexEmail.test(email)) {
                alert("Email invalida");
                return false;
            }

            alert("OK - registrazione completata!");
            return true;
        }
    </script>

</body>
</html>
