<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Piattaforma Vendita Oggetti Base</title>
</head>
<body>
    <h1>MarketHub - Versione Base</h1>

    <h2>1. Importa CSV</h2>
    <input type="file" id="csvFileInput" accept=".csv">

    <h2>2. Catalogo Prodotti</h2>
    <div id="productContainer">Nessun prodotto caricato.</div>

    <h2>3. Carrello</h2>
    <div id="cartList">Il carrello è vuoto.</div>
    <p><strong>Totale: € <span id="totaleCarrello">0.00</span></strong></p>

    <h2>4. Anagrafica</h2>
    <form id="registrationForm">
        <input type="text" name="nome" placeholder="Nome" required>
        <input type="text" name="cognome" placeholder="Cognome" required>
        <button type="submit">Salva Anagrafica</button>
    </form>
    <p id="regMessage" style="display:none; color:green;">Salvato!</p>

    <h2>5. Checkout</h2>
    <button id="checkoutBtn">Conferma Ordine</button>
    <p id="checkoutMessage" style="font-weight:bold;"></p>

    <script>
        let products = [];
        let cart = [];
        let customer = null;

        const productContainer = document.getElementById('productContainer');
        const cartList = document.getElementById('cartList');
        const totalSpan = document.getElementById('totaleCarrello');
        const checkoutMsg = document.getElementById('checkoutMessage');

        document.getElementById('csvFileInput').addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = event => {
                const lines = event.target.result.trim().split('\n');
                products = lines.slice(1).map((line, index) => {
                    const values = line.split(',');
                    return {
                        id: index,
                        nome: values[1] || 'Senza nome',
                        prezzo: parseFloat(values[5]) || 0
                    };
                });
                renderProducts();
            };
            reader.readAsText(file);
        });

        function renderProducts() {
            productContainer.innerHTML = products.map(p =>
                `<div>
                    ${p.nome} - € ${p.prezzo} 
                    <button onclick="addToCart(${p.id})">Aggiungi</button>
                </div>`
            ).join('');
        }

        function renderCart() {
            cartList.innerHTML = cart.map((p, index) =>
                `<div>
                    ${p.nome} - € ${p.prezzo} 
                    <button onclick="removeFromCart(${index})">Rimuovi</button>
                </div>`
            ).join('');
            
            const total = cart.reduce((somma, p) => somma + p.prezzo, 0);
            totalSpan.textContent = total.toFixed(2);
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            if(product) {
                cart.push(product);
                renderCart();
            }
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            renderCart();
        }

        document.getElementById('registrationForm').addEventListener('submit', e => {
            e.preventDefault();
            const formData = new FormData(e.target);
            customer = Object.fromEntries(formData.entries());
            document.getElementById('regMessage').style.display = 'block';
            checkoutMsg.textContent = ""; 
        });

        document.getElementById('checkoutBtn').addEventListener('click', () => {
            if (!customer) {
                checkoutMsg.style.color = "red";
                checkoutMsg.textContent = "Errore: Compila e salva prima l'anagrafica.";
                return;
            }
            if (cart.length === 0) {
                checkoutMsg.style.color = "red";
                checkoutMsg.textContent = "Errore: Il carrello è vuoto.";
                return;
            }
            
            const total = cart.reduce((somma, item) => somma + item.prezzo, 0);
            checkoutMsg.style.color = "green";
            checkoutMsg.textContent = `Ordine confermato per ${customer.nome} ${customer.cognome}. Totale: € ${total.toFixed(2)}`;
        });
    </script>
</body>
</html>
