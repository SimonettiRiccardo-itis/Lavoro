<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Piattaforma Vendita</title>
</head>
<body>
    <h1>MarketHub - Versione Base</h1>

    <h2>1. Importa CSV</h2>
    <input type="file" id="csvFileInput" accept=".csv" onchange="gestisciFile(this)">

    <h2>2. Catalogo Prodotti</h2>
    <div id="productContainer">Nessun prodotto caricato.</div>

    <h2>3. Carrello</h2>
    <div id="cartList">Il carrello è vuoto.</div>
    <p><strong>Totale: € <span id="totaleCarrello">0.00</span></strong></p>

    <h2>4. Anagrafica</h2>
    <form id="registrationForm" onsubmit="return salvaAnagrafica(event)">
        <input type="text" id="inputNome" placeholder="Nome" required>
        <input type="text" id="inputCognome" placeholder="Cognome" required>
        <button type="submit">Salva Anagrafica</button>
    </form>
    <p id="regMessage" style="display:none; color:green;">Salvato!</p>

    <h2>5. Checkout</h2>
    <button id="checkoutBtn" onclick="confermaOrdine()">Conferma Ordine</button>
    <p id="checkoutMessage" style="font-weight:bold;"></p>

    <script>
        var products = [];
        var cart = [];
        var customer = null;

        function gestisciFile(input) {
            var file = input.files[0];
            if (!file) return;

            var reader = new FileReader();
            
            reader.onload = function(event) {
                var testo = event.target.result;
                var righe = testo.trim().split('\n');
                
                products = [];

                for (var i = 1; i < righe.length; i++) {
                    var colonne = righe[i].split(',');
                    var prodotto = {
                        id: i - 1,
                        nome: colonne[1] || 'Senza nome',
                        prezzo: parseFloat(colonne[5]) || 0
                    };
                    products.push(prodotto);
                }
                renderProducts();
            };
            
            reader.readAsText(file);
        }

        function renderProducts() {
            var div = document.getElementById('productContainer');
            var html = "";

            for (var i = 0; i < products.length; i++) {
                var p = products[i];
                html += "<div>" + p.nome + " - € " + p.prezzo + " ";
                html += "<button onclick='addToCart(" + p.id + ")'>Aggiungi</button>";
                html += "</div>";
            }
            div.innerHTML = html;
        }

        function renderCart() {
            var div = document.getElementById('cartList');
            var html = "";
            var somma = 0;

            for (var i = 0; i < cart.length; i++) {
                var p = cart[i];
                html += "<div>" + p.nome + " - € " + p.prezzo + " ";
                html += "<button onclick='removeFromCart(" + i + ")'>Rimuovi</button>";
                html += "</div>";
                somma = somma + p.prezzo;
            }

            div.innerHTML = html;
            document.getElementById('totaleCarrello').textContent = somma.toFixed(2);
        }

        function addToCart(id) {
            for (var i = 0; i < products.length; i++) {
                if (products[i].id === id) {
                    cart.push(products[i]);
                    break;
                }
            }
            renderCart();
        }

        function removeFromCart(indice) {
            cart.splice(indice, 1);
            renderCart();
        }

        function salvaAnagrafica(event) {
            event.preventDefault();
            
            customer = {
                nome: document.getElementById('inputNome').value,
                cognome: document.getElementById('inputCognome').value
            };

            document.getElementById('regMessage').style.display = 'block';
            document.getElementById('checkoutMessage').textContent = "";
            return false;
        }

        function confermaOrdine() {
            var display = document.getElementById('checkoutMessage');

            if (customer === null) {
                display.style.color = "red";
                display.textContent = "Errore: Compila e salva prima l'anagrafica.";
                return;
            }

            if (cart.length === 0) {
                display.style.color = "red";
                display.textContent = "Errore: Il carrello è vuoto.";
                return;
            }

            var totale = 0;
            for (var i = 0; i < cart.length; i++) {
                totale = totale + cart[i].prezzo;
            }

            display.style.color = "green";
            display.textContent = "Ordine confermato per " + customer.nome + " " + customer.cognome + ". Totale: € " + totale.toFixed(2);
        }
    </script>
</body>
</html>
